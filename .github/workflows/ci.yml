name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ci:
    name: Lint, Validate & Security Scan
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # ⚡ Cache Helm
      - name: Cache Helm
        uses: actions/cache@v4
        with:
          path: ~/.cache/helm
          key: helm-${{ runner.os }}

      # 🧹 YAML Lint
      - name: YAML Lint (Helm + Repo Safe)
        continue-on-error: true
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            ignore: |
              charts/**/templates/*
              **/templates/*
              examples/**
              crossplane-example/**
              **/*test.yaml
              **/*tests/**
              **/examples/**
              **/old/**
              **/*.tpl
            rules:
              indentation:
                level: warning
                indent-sequences: false
              line-length:
                max: 300
                level: warning
              empty-lines:
                max: 3
                level: warning
              trailing-spaces:
                level: warning
              document-start:
                present: false
              truthy:
                level: warning
              new-line-at-end-of-file:
                level: warning

      # 📦 Setup Helm
      - name: Setup Helm
        uses: azure/setup-helm@v4

      # 🔍 Helm Lint
      - name: Helm Lint
        run: helm lint helm/crossview

      # 🧪 Helm Template Validation
      - name: Helm Template Render Test
        run: helm template test helm/crossview > /dev/null

      # 📦 Helm Package (Single Chart)
      - name: Helm Package Dry Run (crossview)
        run: |
          mkdir -p packaged
          helm package helm/crossview --destination packaged

      # 🔐 Secret Scan
      - name: Scan for Secrets
        uses: trufflesecurity/trufflehog@v3.63.2
        with:
          path: ./

      # 🔐 Install Trivy (latest)
      - name: Install Trivy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_$(uname -s)_64bit.deb
          sudo dpkg -i trivy_*_64bit.deb

      # 🔐 Scan Kubernetes manifests
      - name: Scan Kubernetes manifests
        run: trivy config .

      # 📦 Package All Charts (if multiple)
      - name: Helm Package All Charts
        run: |
          mkdir -p packaged
          for chart in charts/*; do
            helm package "$chart" --destination packaged
          done

      # 📤 Upload Artifacts
      - name: Upload Helm Packages
        uses: actions/upload-artifact@v4
        with:
          name: helm-packages
          path: packaged/
