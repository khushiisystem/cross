name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Go (adjust if needed)
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cache Go Modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Install Dependencies
        run: go mod tidy

      - name: Lint
        run: |
          go vet ./...
          go fmt ./...

      - name: Run Tests
        run: go test ./... -v

      - name: Security Scan (basic)
        run: |
          go list -json -deps ./... | grep -i "error" || true

      - name: Build
        run: go build ./...
