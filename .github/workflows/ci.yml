name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ci:
    name: Lint, Validate & Security Scan
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # ⚡ Cache Helm
      - name: Cache Helm
        uses: actions/cache@v4
        with:
          path: ~/.cache/helm
          key: helm-${{ runner.os }}

      # 🧹 YAML Lint
      - name: YAML Lint (Helm + Repo Safe)
        continue-on-error: true
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: |
            extends: default
            ignore: |
              **/templates/*
              **/*.tpl
              **/tests/**
              **/examples/**
            rules:
              indentation:
                level: warning
              line-length:
                max: 300
                level: warning

      # 📦 Setup Helm
      - name: Setup Helm
        uses: azure/setup-helm@v4

      # 🔍 Helm Lint
      - name: Helm Lint
        run: helm lint helm/crossview

      # 🧪 Helm Template Validation
      - name: Helm Template Render Test
        run: helm template test helm/crossview > /dev/null

      # 📦 Helm Package
      - name: Helm Package
        run: |
          mkdir -p packaged
          helm package helm/crossview --destination packaged

      # 🔐 Secret Scan
      - name: Scan for Secrets
        uses: trufflesecurity/trufflehog@v3.63.2
        with:
          path: ./

      # 🔐 Trivy Security Scan (Correct Way)
      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: 0

      # 📤 Upload Artifacts
      - name: Upload Helm Packages
        uses: actions/upload-artifact@v4
        with:
          name: helm-packages
          path: packaged/
